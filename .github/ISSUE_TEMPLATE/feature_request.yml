name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Check the [wiki](https://github.com/roekish-org/twenty-app-cal-bridge/wiki)
        and [existing issues](https://github.com/roekish-org/twenty-app-cal-bridge/issues) first to avoid duplicates.
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do that's hard or impossible today?
      placeholder: I want bookings to also create a follow-up Task...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like Cal bridge to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've thought about.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else — mockups, links to Cal.com / Twenty docs, etc.
